<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Hòm Thư Bí Mật | Việt & Vân</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="flowers" id="flowers"></div>
    
    <div class="container">
        <div id="app"></div>
    </div>

    <!-- Modal nhập mật khẩu -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔐 MỞ THƯ</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <p id="modalHint" class="hint-text"></p>
                <input type="password" id="modalPassword" placeholder="Nhập mật khẩu">
                <div id="modalError" class="error-msg"></div>
            </div>
            <div class="modal-footer">
                <button id="submitPassword" class="minecraft-btn">MỞ THƯ</button>
            </div>
        </div>
    </div>

    <!-- Modal viết thư -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✉️ VIẾT THƯ MỚI</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="letterTitle" placeholder="💌 Tiêu đề thư">
                <input type="text" id="letterAuthor" placeholder="✍️ Tên người gửi">
                <textarea id="letterContent" rows="5" placeholder="📝 Nội dung thư..."></textarea>
                <input type="password" id="letterPassword" placeholder="🔐 Mật khẩu cho thư này">
                <input type="text" id="letterHint" placeholder="💡 Gợi ý mật khẩu">
            </div>
            <div class="modal-footer">
                <button id="submitLetter" class="submit-btn">💌 GỬI THƯ</button>
            </div>
        </div>
    </div>

    <script>
        // Tạo hoa rơi
        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            const icons = ['💓', '🌸', '🌼', '⛅', '🌷', '💞', '🌸'];
            flower.textContent = icons[Math.floor(Math.random() * icons.length)];
            flower.style.left = Math.random() * 100 + '%';
            flower.style.fontSize = (12 + Math.random() * 18) + 'px';
            flower.style.animationDuration = (4 + Math.random() * 6) + 's';
            flower.style.opacity = 0.3 + Math.random() * 0.5;
            document.getElementById('flowers').appendChild(flower);
            setTimeout(() => flower.remove(), 10000);
        }
        setInterval(() => {
            for (let i = 0; i < 2; i++) createFlower();
        }, 400);
    </script>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📬 Hòm Thư Bí Mật | Việt & Vân</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Màn hình chính dựa theo hash URL -->
        <div id="app"></div>
    </div>

    <!-- Modal nhập mật khẩu -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔐 MỞ THƯ</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <p id="modalHint" class="hint-text"></p>
                <input type="password" id="modalPassword" placeholder="Nhập mật khẩu" class="password-input">
                <div id="modalError" class="error-msg"></div>
            </div>
            <div class="modal-footer">
                <button id="submitPassword" class="minecraft-btn">MỞ THƯ</button>
            </div>
        </div>
    </div>

    <!-- Modal viết thư -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✉️ VIẾT THƯ MỚI</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <input type="text" id="letterTitle" placeholder="Tiêu đề thư">
                <input type="text" id="letterAuthor" placeholder="Tên người gửi">
                <textarea id="letterContent" rows="5" placeholder="Nội dung thư..."></textarea>
                <input type="password" id="letterPassword" placeholder="🔐 Mật khẩu cho thư này">
                <input type="text" id="letterHint" placeholder="💡 Gợi ý mật khẩu (ví dụ: sinh nhật của em)">
            </div>
            <div class="modal-footer">
                <button id="submitLetter" class="minecraft-btn">GỬI THƯ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Mail</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            margin-top: 50px;
            color: #ff69b4;
        }
        .mailbox {
            margin: 0 auto;
            width: 300px;
            padding: 20px;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .falling-leaves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ffb6c1;
            opacity: 0.8;
            transform: rotate(45deg);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0); } 
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="falling-leaves"></div>
    <h1>Welcome to Love Mail</h1>
    <div class="mailbox">
        <h2>Your Mailbox</h2>
        <form>
            <input type="text" placeholder="Your message here" required>
            <button type="submit">Send Love</button>
        </form>
    </div>
    <script>
        // Falling Leaves Animation
        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.querySelector('.falling-leaves').appendChild(leaf);
            setTimeout(() => {
                leaf.remove();
            }, 5000);
        }
        setInterval(createLeaf, 500);
    </script>
</body>
</html>
